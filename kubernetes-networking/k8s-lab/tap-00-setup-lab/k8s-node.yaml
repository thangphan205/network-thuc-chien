#cloud-config

# Disable swap (K8s requirement)
bootcmd:
  - swapoff -a

write_files:
  # Auto-load kernel modules on boot
  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

  # Sysctl for bridge networking + IP forwarding
  - path: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

  # Kubernetes apt repo
  - path: /etc/apt/sources.list.d/kubernetes.list
    content: |
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.32/deb/ /

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gpg
  - containerd

package_update: true
package_upgrade: false

runcmd:
  # Remove swap from fstab
  - sed -i '/\bswap\b/d' /etc/fstab

  # Load kernel modules now
  - modprobe overlay
  - modprobe br_netfilter

  # Apply sysctl settings
  - sysctl --system

  # Configure containerd with SystemdCgroup
  - mkdir -p /etc/containerd
  - containerd config default > /etc/containerd/config.toml
  - sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
  - systemctl restart containerd
  - systemctl enable containerd

  # Add Kubernetes signing key
  - mkdir -p /etc/apt/keyrings
  - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg

  # Install Kubernetes tools
  - apt-get update -q
  - apt-get install -y kubelet kubeadm kubectl
  - apt-mark hold kubelet kubeadm kubectl
  - systemctl enable kubelet

  # Pre-pull netshoot for lab use
  - crictl pull docker.io/nicolaka/netshoot || true

final_message: "K8s node ready after $UPTIME seconds"
