#cloud-config
runcmd:
  - "export DEBIAN_FRONTEND=noninteractive"
  - "swapoff -a"
  - "sed -i '/ swap / s/^\\(.*\\)$/#\\1/g' /etc/fstab"
  - "modprobe overlay"
  - "modprobe br_netfilter"
  - "sh -c 'echo \"overlay\nbr_netfilter\" > /etc/modules-load.d/k8s.conf'"
  - "sh -c 'echo \"net.bridge.bridge-nf-call-iptables = 1\nnet.bridge.bridge-nf-call-ip6tables = 1\nnet.ipv4.ip_forward = 1\" > /etc/sysctl.d/k8s.conf'"
  - "sysctl --system"
  - "apt-get update"
  - "apt-get install -y apt-transport-https ca-certificates curl gpg"
  - "curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg"
  # Fallback về noble nếu Docker chưa publish repo cho codename Ubuntu 26.04
  - "sh -c 'CODENAME=$(lsb_release -cs); curl -sf https://download.docker.com/linux/ubuntu/dists/${CODENAME}/Release -o /dev/null || CODENAME=noble; echo \"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu ${CODENAME} stable\" > /etc/apt/sources.list.d/docker.list'"
  - "apt-get update"
  - "apt-get install -y containerd.io"
  - "mkdir -p /etc/containerd"
  - "sh -c 'containerd config default > /etc/containerd/config.toml'"
  - "sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml"
  - "systemctl restart containerd"
  - "systemctl enable containerd"
  - "curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.36/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg"
  - "sh -c 'echo \"deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.36/deb/ /\" > /etc/apt/sources.list.d/kubernetes.list'"
  - "apt-get update"
  - "apt-get install -y kubelet kubeadm kubectl"
  - "apt-mark hold kubelet kubeadm kubectl"